# ============================================
# WhatsApp Clone — Docker Compose (Full Stack)
# ============================================
# Spins up the entire application:
#   Infrastructure: PostgreSQL (x2), MongoDB, Redis
#   Services:       API Gateway, Auth, User, Chat, Presence, Notification, Media
#   Frontend:       Vite React app served via Nginx
#
# Usage:
#   docker compose up -d         # Start all
#   docker compose down          # Stop all
#   docker compose logs -f       # Stream logs
#   docker compose down -v       # Stop + delete volumes

services:
  # ══════════════════════════════════════════
  #   INFRASTRUCTURE
  # ══════════════════════════════════════════

  # ── PostgreSQL: Auth DB ──
  postgres-auth:
    image: postgres:16-alpine
    container_name: whatsapp-postgres-auth
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL: User DB ──
  postgres-user:
    image: postgres:16-alpine
    container_name: whatsapp-postgres-user
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB: Chat + Notification DBs ──
  mongodb:
    image: mongo:7.0
    container_name: whatsapp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: whatsapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════
  #   MICROSERVICES
  # ══════════════════════════════════════════

  # ── Auth Service ──
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_NAME: auth-service
    container_name: whatsapp-auth-service
    restart: unless-stopped
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

  # ── User Service ──
  user-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_NAME: user-service
    container_name: whatsapp-user-service
    restart: unless-stopped
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

  # ── Chat Service ──
  chat-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_NAME: chat-service
    container_name: whatsapp-chat-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

  # ── Presence Service ──
  presence-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_NAME: presence-service
    container_name: whatsapp-presence-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

  # ── Notification Service ──
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_NAME: notification-service
    container_name: whatsapp-notification-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

  # ── Media Service ──
  media-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_NAME: media-service
    container_name: whatsapp-media-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

  # ══════════════════════════════════════════
  #   GATEWAY + FRONTEND
  # ══════════════════════════════════════════

  # ── API Gateway ──
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE_NAME: api-gateway
    container_name: whatsapp-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - user-service
      - chat-service
      - presence-service
      - media-service
      - notification-service
    env_file:
      - .env.docker

  # ── Frontend (Vite + Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: whatsapp-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  postgres_auth_data:
    driver: local
  postgres_user_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
