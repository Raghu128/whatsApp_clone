syntax = "proto3";

package user;

// User Service gRPC definitions
// Used by Chat Service to fetch user profiles and group member lists

service UserService {
  // Get a user's profile information
  rpc GetUserProfile (GetUserProfileRequest) returns (GetUserProfileResponse);

  // Get all members of a group (for group message delivery)
  rpc GetGroupMembers (GetGroupMembersRequest) returns (GetGroupMembersResponse);

  // Get multiple user profiles in a batch
  rpc GetUserProfiles (GetUserProfilesRequest) returns (GetUserProfilesResponse);

  // Check whether target_user_id is in owner_user_id's contact list
  // (and whether that relationship is blocked). Used to enforce
  // "only contacts can chat" at the service boundary.
  rpc CheckContact (CheckContactRequest) returns (CheckContactResponse);
}

// ── GetUserProfile ──

message GetUserProfileRequest {
  string user_id = 1;
}

message GetUserProfileResponse {
  string user_id = 1;
  string display_name = 2;
  string avatar_url = 3;
  string about = 4;
  string phone = 5;
}

// ── GetGroupMembers ──

message GetGroupMembersRequest {
  string group_id = 1;
}

message GroupMember {
  string user_id = 1;
  string display_name = 2;
  string avatar_url = 3;
  string role = 4;        // 'admin' or 'member'
  string joined_at = 5;
}

message GetGroupMembersResponse {
  string group_id = 1;
  repeated GroupMember members = 2;
  int32 total_members = 3;
}

// ── GetUserProfiles (Batch) ──

message GetUserProfilesRequest {
  repeated string user_ids = 1;
}

message GetUserProfilesResponse {
  repeated GetUserProfileResponse profiles = 1;
}

// ── CheckContact ──

message CheckContactRequest {
  string owner_user_id = 1;   // The user who is trying to chat / send
  string target_user_id = 2;  // The other participant
}

message CheckContactResponse {
  bool exists = 1;     // owner has target saved as a contact
  bool is_blocked = 2; // owner has blocked target
}
